kind = "web"
previewPath = "/"
title = "AXIS Premium Search"
version = "1.0.0"
id = "artifacts/axis-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24080

[services.development]
run = "pnpm --filter @workspace/axis-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/axis-search", "run", "build" ]
publicDir = "artifacts/axis-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24080"
BASE_PATH = "/"
